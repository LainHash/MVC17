name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  IMAGE_NAME: mvc17
  DOTNET_VERSION: "8.0.x"

jobs:
  # ============================================================
  # Job 1: Build & Test
  # ============================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore MVC17/MVC17.csproj

      - name: Build (Release)
        run: dotnet build MVC17/MVC17.csproj -c Release --no-restore

      # Uncomment when you add a test project:
      # - name: Run tests
      #   run: dotnet test --no-build -c Release --verbosity normal

  # ============================================================
  # Job 2: Build & Push Docker Image
  # Runs only on push to main/master (not PRs)
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: Deploy to Production
  # Runs only after Docker image is pushed
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Stop & remove old container (ignore error if not running)
            docker stop mvc17_app 2>/dev/null || true
            docker remove mvc17_app 2>/dev/null || true

            # Start new container with all secrets from env
            docker run -d \
              --name mvc17_app \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e "ConnectionStrings__MyConnectString=${{ secrets.SQL_CONNECTION_STRING }}" \
              -e "Jwt__Key=${{ secrets.JWT_SECRET }}" \
              -e "Jwt__Issuer=MyApp" \
              -e "Jwt__Audience=MyAppUsers" \
              -e "GmailSettings__Host=smtp.gmail.com" \
              -e "GmailSettings__Port=587" \
              -e "GmailSettings__SenderEmail=${{ secrets.GMAIL_SENDER_EMAIL }}" \
              -e "GmailSettings__SenderName=DDH" \
              -e "GmailSettings__AppPassword=${{ secrets.EMAIL_SMTP_PASSWORD }}" \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Clean up dangling images
            docker image prune -f

            echo "✅ Deployment complete at $(date)"
